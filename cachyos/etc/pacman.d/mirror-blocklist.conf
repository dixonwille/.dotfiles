# Mirror URL blocklist for /usr/local/bin/rate-mirrors interposer.
#
# Syntax: one POSIX extended regex per line, matched against the full mirror
# line that rate-mirrors will receive on stdin:
#   - arch   → "<url>\t<country_code>"   (e.g. "https://foo/archlinux/\tDE")
#   - cachyos → "<url>"                  (no country column — we don't have it)
#
# Blank lines and lines beginning with # are ignored. Use [[:space:]] instead
# of \t — grep -E does not interpret \t as a tab character.

# ── Country-level exclusions (arch only) ──────────────────────────────────
# Matches the <tab><CC> tail of each arch line. Countries listed here are
# high-threat/adversarial geographies where we preemptively skip the whole
# pool rather than play whack-a-mole with individual mirrors.
#   RU, MX — observed triggers in UniFi alerts
#   HK, CN, KP, IR — preemptive (sanctioned / adversarial jurisdictions)
# Specific observed offenders in other countries are caught by the
# straggler rules below instead.
[[:space:]](RU|MX|HK|CN|KP|IR)$

# ── TLD-level block ──────────────────────────────────────────────────────
# Any .su-hosted mirror will trip ET DNS sig 2014169 on lookup, independent
# of what country its server is physically in. Redundant with the RU country
# rule above today, but guards against a .su mirror labeled as some other
# country (TLD ≠ hosting country).
\.su/

# ── Domain-level stragglers ──────────────────────────────────────────────
# Specific observed offenders whose country is now allowed. Widened to the
# bare org domain so new regional variants are caught automatically
# (e.g. mirror.br.cdn-perfprod.com, cyberbits.xyz, …).
#
# Keep comments on their own lines — the wrapper only strips full-line
# comments, so inline trailing "# …" would be parsed into the regex.

# CDN operator — observed in SG, ES, NL, US
cdn-perfprod\.com

# CDN operator — observed in FR, TH
cyberbits\.

# Single host — observed in GB
mirror\.st2projects\.com
